<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f6f9" />
    <title>Waiver Platform</title>
    <!-- Demo-embed bootstrap: when loaded with ?demo=admin|student (e.g. embedded
         in the pitch deck), seed the demo role / theme / skin into localStorage
         BEFORE the theme+skin boot scripts and AuthProvider read them. Gated
         entirely behind the param — no effect on normal app usage. -->
    <script>
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          var demo = p.get('demo');
          if (!demo) return;
          localStorage.setItem('demo_role', demo === 'student' ? 'student' : 'admin');
          localStorage.setItem('ccc:theme', p.get('theme') || 'light');
          localStorage.setItem('ccc:skin', p.get('skin') || 'enterprise');
          localStorage.setItem('ccc:sidebar-collapsed', '0');
        } catch (e) {}
      })();
    </script>
    <!-- No-flash theme boot: resolve & paint the theme BEFORE first paint so the
         page never flashes light-then-dark. Mirrors ThemeProvider's logic; the
         'ccc:theme' key and default-to-system policy MUST match it. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ccc:theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((stored === 'system' || !stored) && systemDark);
          var resolved = dark ? 'dark' : 'light';
          document.documentElement.dataset.theme = resolved;
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute('content', dark ? '#0c0c0f' : '#f5f6f9');
        } catch (e) {}
      })();
    </script>
    <!-- No-flash skin boot: paint the visual skin (enterprise console vs liquid
         glass) BEFORE first paint so the flat slate ground / aurora is correct
         from frame one. Mirrors SkinProvider; the 'ccc:skin' key and
         default-to-enterprise policy MUST match it. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('ccc:skin');
          document.documentElement.dataset.skin =
            s === 'glass' || s === 'enterprise' ? s : 'enterprise';
        } catch (e) {}
      })();
    </script>
    <!-- Brenda type system: Hanken Grotesk (UI), Newsreader (display serif),
         Cormorant Garamond (hero), JetBrains Mono (eyebrow labels + metrics).
         Loaded via <link> rather than CSS @import so it never races the
         `@import "tailwindcss"` ordering rule. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
